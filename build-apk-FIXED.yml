name: Build Blog Activity Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Create Android project
        shell: bash
        run: |
          set -e
          mkdir -p "$(dirname 'settings.gradle.kts')"
          echo '' | base64 --decode > 'settings.gradle.kts'
          mkdir -p "$(dirname 'build.gradle.kts')"
          echo 'cGx1Z2lucyB7CiAgICBpZCgiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iKSB2ZXJzaW9uICI4LjcuMyIgYXBwbHkgZmFsc2UKfQo=' | base64 --decode > 'build.gradle.kts'
          mkdir -p "$(dirname 'gradle.properties')"
          echo 'b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQubm9uVHJhbnNpdGl2ZVJDbGFzcz10cnVlCg==' | base64 --decode > 'gradle.properties'
          mkdir -p "$(dirname 'app/build.gradle.kts')"
          echo '' | base64 --decode > 'app/build.gradle.kts'
          mkdir -p "$(dirname 'app/proguard-rules.pro')"
          echo 'IyBObyBjdXN0b20gcnVsZXMuCg==' | base64 --decode > 'app/proguard-rules.pro'
          mkdir -p "$(dirname 'app/src/main/AndroidManifest.xml')"
          echo '' | base64 --decode > 'app/src/main/AndroidManifest.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/colors.xml')"
          echo '' | base64 --decode > 'app/src/main/res/values/colors.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/themes.xml')"
          echo '' | base64 --decode > 'app/src/main/res/values/themes.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/strings.xml')"
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkJsb2cgQWN0aXZpdHkgTWFuYWdlcjwvc3RyaW5nPgo8L3Jlc291cmNlcz4K' | base64 --decode > 'app/src/main/res/values/strings.xml'
          mkdir -p "$(dirname 'app/src/main/res/layout/activity_main.xml')"
          echo '' | base64 --decode > 'app/src/main/res/layout/activity_main.xml'
          mkdir -p "$(dirname 'app/src/main/java/com/sunny2one/blogactivitymanager/MainActivity.java')"
          echo '' | base64 --decode > 'app/src/main/java/com/sunny2one/blogactivitymanager/MainActivity.java'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlogActivityManager-v1.0-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
